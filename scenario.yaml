# District Telehealth & Emergency Communication Network Scenario
# TELE 527 Group 1 - BIUST 2026

# Network topology and configuration
sites:
  - name: CR-1
    type: core_router
    x_km: 0
    y_km: 0
  - name: CR-2
    type: core_router
    x_km: 0
    y_km: 50
  - name: BS1
    type: base_station
    x_km: -20
    y_km: 10
  - name: BS2
    type: base_station
    x_km: -10
    y_km: 20
  - name: BS3
    type: base_station
    x_km: 10
    y_km: 30
  - name: BS4
    type: base_station
    x_km: 20
    y_km: 40
  - name: BS5
    type: base_station
    x_km: 0
    y_km: 25

# Network links with propagation delays
links:
  - from: BS1
    to: CR-1
    role: primary
    delay_ms: 5.0
  - from: BS1
    to: CR-2
    role: secondary
    delay_ms: 8.0
  - from: BS2
    to: CR-1
    role: primary
    delay_ms: 4.0
  - from: BS2
    to: CR-2
    role: secondary
    delay_ms: 7.0
  - from: BS3
    to: CR-1
    role: primary
    delay_ms: 6.0
  - from: BS3
    to: CR-2
    role: secondary
    delay_ms: 5.0
  - from: BS4
    to: CR-1
    role: primary
    delay_ms: 7.0
  - from: BS4
    to: CR-2
    role: secondary
    delay_ms: 4.0
  - from: BS5
    to: CR-1
    role: primary
    delay_ms: 5.5
  - from: BS5
    to: CR-2
    role: secondary
    delay_ms: 6.5

# Environment parameters
environment:
  district_size_km: 50
  carrier_frequency_mhz: 1800
  terrain_type: rural
  morphology: mixed
  base_station_height_m: 30
  mobile_height_m: 1.5
  tx_power_dbm: 20
  coverage_threshold_outdoor_dbm: -85
  coverage_threshold_indoor_dbm: -95
  shadow_fading_margin_db: 10
  body_loss_db: 3
  indoor_penetration_loss_db: 15

# Traffic configuration
traffic:
  voice:
    arrival_rate_per_hour: 15
    holding_time_s: 180
    offered_load_erl: 10.0
    kpi_blocking_prob: 0.01
    bitrate_kbps: 64
  telemetry:
    arrival_rate_per_hour: 30
    holding_time_s: 60
    offered_load_erl: 0.50
    packet_size_bytes: 512
    kpi_delay_p95_ms: 100
  video:
    arrival_rate_per_hour: 8
    holding_time_s: 300
    offered_load_erl: 5.0
    kpi_delay_p95_ms: 50
    bitrate_mbps: 2.0
  backhaul_trunk_erl: 25.0

# QoS parameters
qos:
  utilisation_zones:
    safe: 0.7
    warning: 0.8
    critical: 0.9

# Simulation parameters
simulation:
  random_seed: 42
  load_multiplier_steps: [0.5, 1.0, 1.5, 2.0, 2.5]

# Backhaul configuration
backhaul:
  frequency_ghz: 13.0
  tx_power_dbm: 20
  tx_antenna_gain_dbi: 30
  rx_antenna_gain_dbi: 30
  misc_losses_db: 3.0
  receiver_threshold_dbm: -80
  min_fade_margin_db: 20.0
  system_losses_db: 3.0
  fade_margin_db: 20.0
  rx_sensitivity_dbm: -80

# Backbone configuration
backbone_13ghz:
  frequency_ghz: 13.0
  distance_km: 50
  tx_power_dbm: 25
  tx_antenna_gain_dbi: 35
  rx_antenna_gain_dbi: 35
  misc_losses_db: 2.0
  receiver_threshold_dbm: -75
  min_fade_margin_db: 25.0
  system_losses_db: 2.0
  fade_margin_db: 25.0
  rx_sensitivity_dbm: -75
