# TELE 527 — District Telehealth Network

simulation:
  random_seed: 42
  load_multiplier_range: [1.0, 5.0]
  load_multiplier_steps: [1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 5.0]
  forecast_horizon_years: 5
  growth_rate: 0.15

sites:
  - {name: CR-1, label: District Hospital,      type: core_router,  x_km: 25.0, y_km: 25.0}
  - {name: CR-2, label: District Health Office,  type: core_router,  x_km: 20.0, y_km: 28.0}
  - {name: BS1,  label: Clinic North-West,       type: base_station, x_km:  8.0, y_km: 40.0}
  - {name: BS2,  label: Clinic North-East,       type: base_station, x_km: 42.0, y_km: 40.0}
  - {name: BS3,  label: Clinic South-West,       type: base_station, x_km:  8.0, y_km: 10.0}
  - {name: BS4,  label: Clinic South,            type: base_station, x_km: 25.0, y_km:  8.0}
  - {name: BS5,  label: Clinic South-East,       type: base_station, x_km: 42.0, y_km: 10.0}

links:
  # Core backbone — 13 GHz microwave primary + LTE priority bearer backup
  # REMOVED: fibre primary (replaced by 13 GHz microwave — no civil works needed)
  # REMOVED: 7 GHz microwave backup (replaced by LTE — independent failure mode)
  - {from: CR-1, to: CR-2, capacity_mbps: 500, delay_ms:  0.5, type: microwave_13ghz, role: primary, weight:  1, frequency_ghz: 13.0}
  - {from: CR-2, to: CR-1, capacity_mbps: 500, delay_ms:  0.5, type: microwave_13ghz, role: primary, weight:  1, frequency_ghz: 13.0}
  - {from: CR-1, to: CR-2, capacity_mbps:  30, delay_ms: 45.0, type: lte_priority,    role: backup,  weight: 10, frequency_mhz: 1800, qci_class: 65}
  - {from: CR-2, to: CR-1, capacity_mbps:  30, delay_ms: 45.0, type: lte_priority,    role: backup,  weight: 10, frequency_mhz: 1800, qci_class: 65}

  # CR-1 primary links to all base stations (7 GHz microwave — unchanged)
  - {from: CR-1, to: BS1, capacity_mbps: 100, delay_ms:  8.0, type: microwave, role: primary, weight: 1}
  - {from: BS1, to: CR-1, capacity_mbps: 100, delay_ms:  8.0, type: microwave, role: primary, weight: 1}
  - {from: CR-1, to: BS2, capacity_mbps: 100, delay_ms:  8.0, type: microwave, role: primary, weight: 1}
  - {from: BS2, to: CR-1, capacity_mbps: 100, delay_ms:  8.0, type: microwave, role: primary, weight: 1}
  - {from: CR-1, to: BS3, capacity_mbps: 100, delay_ms:  9.0, type: microwave, role: primary, weight: 1}
  - {from: BS3, to: CR-1, capacity_mbps: 100, delay_ms:  9.0, type: microwave, role: primary, weight: 1}
  - {from: CR-1, to: BS4, capacity_mbps: 100, delay_ms:  7.0, type: microwave, role: primary, weight: 1}
  - {from: BS4, to: CR-1, capacity_mbps: 100, delay_ms:  7.0, type: microwave, role: primary, weight: 1}
  - {from: CR-1, to: BS5, capacity_mbps: 100, delay_ms:  9.0, type: microwave, role: primary, weight: 1}
  - {from: BS5, to: CR-1, capacity_mbps: 100, delay_ms:  9.0, type: microwave, role: primary, weight: 1}

  # CR-2 backup links to all base stations (Topology 5 dual-homing — unchanged)
  - {from: CR-2, to: BS1, capacity_mbps: 100, delay_ms: 13.0, type: microwave, role: backup, weight: 5}
  - {from: BS1, to: CR-2, capacity_mbps: 100, delay_ms: 13.0, type: microwave, role: backup, weight: 5}
  - {from: CR-2, to: BS2, capacity_mbps: 100, delay_ms: 24.0, type: microwave, role: backup, weight: 5}
  - {from: BS2, to: CR-2, capacity_mbps: 100, delay_ms: 24.0, type: microwave, role: backup, weight: 5}
  - {from: CR-2, to: BS3, capacity_mbps: 100, delay_ms: 20.0, type: microwave, role: backup, weight: 5}
  - {from: BS3, to: CR-2, capacity_mbps: 100, delay_ms: 20.0, type: microwave, role: backup, weight: 5}
  - {from: CR-2, to: BS4, capacity_mbps: 100, delay_ms: 21.0, type: microwave, role: backup, weight: 5}
  - {from: BS4, to: CR-2, capacity_mbps: 100, delay_ms: 21.0, type: microwave, role: backup, weight: 5}
  - {from: CR-2, to: BS5, capacity_mbps: 100, delay_ms: 26.0, type: microwave, role: backup, weight: 5}
  - {from: BS5, to: CR-2, capacity_mbps: 100, delay_ms: 26.0, type: microwave, role: backup, weight: 5}

traffic:
  telemetry: {arrival_rate_per_hour: 30, holding_time_s:  60, offered_load_erl: 0.50, packet_size_bytes: 256, dscp: 46, kpi_delay_p95_ms:   50}
  voice:     {arrival_rate_per_hour: 15, holding_time_s: 180, offered_load_erl: 0.75, bitrate_kbps:       64, dscp: 26, kpi_blocking_prob: 0.02}
  video:     {arrival_rate_per_hour:  8, holding_time_s: 300, offered_load_erl: 0.67, bitrate_mbps:      3.0, dscp: 18, kpi_delay_p95_ms:  150}
  backhaul_trunk_erl: 3.75

environment:
  carrier_frequency_mhz: 1800
  base_station_height_m: 30.0
  mobile_height_m: 1.5
  shadow_fading_margin_db: 8.0
  body_loss_db: 3.0
  indoor_penetration_loss_db: 10.0
  tx_power_dbm: 43.0
  coverage_threshold_outdoor_dbm: -90.0
  coverage_threshold_indoor_dbm: -80.0
  grid_resolution_m: 100
  district_size_km: 50.0
  terrain_type: suburban_rural

backhaul:
  frequency_ghz: 7.0
  tx_power_dbm: 25.0
  tx_antenna_gain_dbi: 34.0
  rx_antenna_gain_dbi: 34.0
  misc_losses_db: 2.0
  receiver_threshold_dbm: -85.0
  min_fade_margin_db: 20.0
  rainfall_zone: botswana

backbone_13ghz:
  frequency_ghz: 13.0
  link_distance_km: 5.8
  tx_power_dbm: 23.0
  tx_antenna_gain_dbi: 38.0
  rx_antenna_gain_dbi: 38.0
  misc_losses_db: 2.0
  receiver_threshold_dbm: -83.0
  min_fade_margin_db: 20.0
  rainfall_zone: botswana

lte_backup:
  operator: BTC_Botswana
  frequency_mhz: 1800
  qci_class: 65
  guaranteed_bitrate_mbps: 10
  max_bitrate_mbps: 30
  delay_ms: 45.0
  failure_mode: bts_outage_or_congestion

qos:
  scheduler: wfq_with_priority
  weights: {telemetry: strict_priority, voice: 0.30, video: 0.40, best_effort: 0.30}
  utilisation_zones: {safe: 0.70, monitor: 0.90}

forecasting:
  annual_growth_rate: 0.15
  horizon_years: 5
  initial_utilisation: 0.60
  planning_trigger_rho: 0.70
  action_trigger_rho: 0.90
# District Telehealth & Emergency Communication Network Scenario
# TELE 527 Group 1 - BIUST 2026

# Network topology and configuration
sites:
  - name: CR-1
    type: core_router
    x_km: 0
    y_km: 0
  - name: CR-2
    type: core_router
    x_km: 0
    y_km: 50
  - name: BS1
    type: base_station
    x_km: -20
    y_km: 10
  - name: BS2
    type: base_station
    x_km: -10
    y_km: 20
  - name: BS3
    type: base_station
    x_km: 10
    y_km: 30
  - name: BS4
    type: base_station
    x_km: 20
    y_km: 40
  - name: BS5
    type: base_station
    x_km: 0
    y_km: 25

# Network links with propagation delays
links:
  - from: BS1
    to: CR-1
    role: primary
    delay_ms: 5.0
  - from: BS1
    to: CR-2
    role: secondary
    delay_ms: 8.0
  - from: BS2
    to: CR-1
    role: primary
    delay_ms: 4.0
  - from: BS2
    to: CR-2
    role: secondary
    delay_ms: 7.0
  - from: BS3
    to: CR-1
    role: primary
    delay_ms: 6.0
  - from: BS3
    to: CR-2
    role: secondary
    delay_ms: 5.0
  - from: BS4
    to: CR-1
    role: primary
    delay_ms: 7.0
  - from: BS4
    to: CR-2
    role: secondary
    delay_ms: 4.0
  - from: BS5
    to: CR-1
    role: primary
    delay_ms: 5.5
  - from: BS5
    to: CR-2
    role: secondary
    delay_ms: 6.5

# Environment parameters
environment:
  district_size_km: 50
  carrier_frequency_mhz: 1800
  terrain_type: rural
  morphology: mixed
  base_station_height_m: 30
  mobile_height_m: 1.5
  tx_power_dbm: 20
  coverage_threshold_outdoor_dbm: -85
  coverage_threshold_indoor_dbm: -95
  shadow_fading_margin_db: 10
  body_loss_db: 3
  indoor_penetration_loss_db: 15

# Traffic configuration
traffic:
  voice:
    arrival_rate_per_hour: 15
    holding_time_s: 180
    offered_load_erl: 10.0
    kpi_blocking_prob: 0.01
    bitrate_kbps: 64
  telemetry:
    arrival_rate_per_hour: 30
    holding_time_s: 60
    offered_load_erl: 0.50
    packet_size_bytes: 512
    kpi_delay_p95_ms: 100
  video:
    arrival_rate_per_hour: 8
    holding_time_s: 300
    offered_load_erl: 5.0
    kpi_delay_p95_ms: 50
    bitrate_mbps: 2.0
  backhaul_trunk_erl: 25.0

# QoS parameters
qos:
  utilisation_zones:
    safe: 0.7
    warning: 0.8
    critical: 0.9

# Simulation parameters
simulation:
  random_seed: 42
  load_multiplier_steps: [0.5, 1.0, 1.5, 2.0, 2.5]

# Backhaul configuration
backhaul:
  frequency_ghz: 13.0
  tx_power_dbm: 20
  tx_antenna_gain_dbi: 30
  rx_antenna_gain_dbi: 30
  misc_losses_db: 3.0
  receiver_threshold_dbm: -80
  min_fade_margin_db: 20.0
  system_losses_db: 3.0
  fade_margin_db: 20.0
  rx_sensitivity_dbm: -80

# Backbone configuration
backbone_13ghz:
  frequency_ghz: 13.0
  distance_km: 50
  tx_power_dbm: 25
  tx_antenna_gain_dbi: 35
  rx_antenna_gain_dbi: 35
  misc_losses_db: 2.0
  receiver_threshold_dbm: -75
  min_fade_margin_db: 25.0
  system_losses_db: 2.0
  fade_margin_db: 25.0
  rx_sensitivity_dbm: -75
