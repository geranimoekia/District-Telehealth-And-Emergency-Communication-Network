# TELE 527 — District Telehealth Network

simulation:
  random_seed: 42
  load_multiplier_range: [1.0, 5.0]
  load_multiplier_steps: [1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 5.0]
  forecast_horizon_years: 5
  growth_rate: 0.15

sites:
  - {name: CR-1, label: District Hospital,      type: core_router,  x_km: 25.0, y_km: 25.0}
  - {name: CR-2, label: District Health Office,  type: core_router,  x_km: 20.0, y_km: 28.0}
  - {name: BS1,  label: Clinic North-West,       type: base_station, x_km:  8.0, y_km: 40.0}
  - {name: BS2,  label: Clinic North-East,       type: base_station, x_km: 42.0, y_km: 40.0}
  - {name: BS3,  label: Clinic South-West,       type: base_station, x_km:  8.0, y_km: 10.0}
  - {name: BS4,  label: Clinic South,            type: base_station, x_km: 25.0, y_km:  8.0}
  - {name: BS5,  label: Clinic South-East,       type: base_station, x_km: 42.0, y_km: 10.0}

links:
  # Core backbone — fibre primary + microwave backup
  - {from: CR-1, to: CR-2, capacity_mbps: 1000, delay_ms: 0.5, type: fibre,     role: primary, weight: 1}
  - {from: CR-2, to: CR-1, capacity_mbps: 1000, delay_ms: 0.5, type: fibre,     role: primary, weight: 1}
  - {from: CR-1, to: CR-2, capacity_mbps:  200, delay_ms: 0.5, type: microwave, role: backup,  weight: 10}
  - {from: CR-2, to: CR-1, capacity_mbps:  200, delay_ms: 0.5, type: microwave, role: backup,  weight: 10}

  # CR-1 primary links to all base stations
  - {from: CR-1, to: BS1, capacity_mbps: 100, delay_ms:  8.0, type: microwave, role: primary, weight: 1}
  - {from: BS1, to: CR-1, capacity_mbps: 100, delay_ms:  8.0, type: microwave, role: primary, weight: 1}
  - {from: CR-1, to: BS2, capacity_mbps: 100, delay_ms:  8.0, type: microwave, role: primary, weight: 1}
  - {from: BS2, to: CR-1, capacity_mbps: 100, delay_ms:  8.0, type: microwave, role: primary, weight: 1}
  - {from: CR-1, to: BS3, capacity_mbps: 100, delay_ms:  9.0, type: microwave, role: primary, weight: 1}
  - {from: BS3, to: CR-1, capacity_mbps: 100, delay_ms:  9.0, type: microwave, role: primary, weight: 1}
  - {from: CR-1, to: BS4, capacity_mbps: 100, delay_ms:  7.0, type: microwave, role: primary, weight: 1}
  - {from: BS4, to: CR-1, capacity_mbps: 100, delay_ms:  7.0, type: microwave, role: primary, weight: 1}
  - {from: CR-1, to: BS5, capacity_mbps: 100, delay_ms:  9.0, type: microwave, role: primary, weight: 1}
  - {from: BS5, to: CR-1, capacity_mbps: 100, delay_ms:  9.0, type: microwave, role: primary, weight: 1}

  # CR-2 backup links to all base stations (Topology 5 dual-homing)
  - {from: CR-2, to: BS1, capacity_mbps: 100, delay_ms: 13.0, type: microwave, role: backup, weight: 5}
  - {from: BS1, to: CR-2, capacity_mbps: 100, delay_ms: 13.0, type: microwave, role: backup, weight: 5}
  - {from: CR-2, to: BS2, capacity_mbps: 100, delay_ms: 24.0, type: microwave, role: backup, weight: 5}
  - {from: BS2, to: CR-2, capacity_mbps: 100, delay_ms: 24.0, type: microwave, role: backup, weight: 5}
  - {from: CR-2, to: BS3, capacity_mbps: 100, delay_ms: 20.0, type: microwave, role: backup, weight: 5}
  - {from: BS3, to: CR-2, capacity_mbps: 100, delay_ms: 20.0, type: microwave, role: backup, weight: 5}
  - {from: CR-2, to: BS4, capacity_mbps: 100, delay_ms: 21.0, type: microwave, role: backup, weight: 5}
  - {from: BS4, to: CR-2, capacity_mbps: 100, delay_ms: 21.0, type: microwave, role: backup, weight: 5}
  - {from: CR-2, to: BS5, capacity_mbps: 100, delay_ms: 26.0, type: microwave, role: backup, weight: 5}
  - {from: BS5, to: CR-2, capacity_mbps: 100, delay_ms: 26.0, type: microwave, role: backup, weight: 5}

traffic:
  telemetry: {arrival_rate_per_hour: 30, holding_time_s:  60, offered_load_erl: 0.50, packet_size_bytes: 256, dscp: 46, kpi_delay_p95_ms:   50}
  voice:     {arrival_rate_per_hour: 15, holding_time_s: 180, offered_load_erl: 0.75, bitrate_kbps:       64, dscp: 26, kpi_blocking_prob: 0.02}
  video:     {arrival_rate_per_hour:  8, holding_time_s: 300, offered_load_erl: 0.67, bitrate_mbps:      3.0, dscp: 18, kpi_delay_p95_ms:  150}
  backhaul_trunk_erl: 3.75

environment:
  carrier_frequency_mhz: 1800
  base_station_height_m: 30.0
  mobile_height_m: 1.5
  shadow_fading_margin_db: 8.0
  body_loss_db: 3.0
  indoor_penetration_loss_db: 10.0
  tx_power_dbm: 43.0
  coverage_threshold_outdoor_dbm: -90.0
  coverage_threshold_indoor_dbm: -80.0
  grid_resolution_m: 100
  district_size_km: 50.0
  terrain_type: suburban_rural

backhaul:
  frequency_ghz: 7.0
  tx_power_dbm: 25.0
  tx_antenna_gain_dbi: 34.0
  rx_antenna_gain_dbi: 34.0
  misc_losses_db: 2.0
  receiver_threshold_dbm: -85.0
  min_fade_margin_db: 20.0
  rainfall_zone: botswana

qos:
  scheduler: wfq_with_priority
  weights: {telemetry: strict_priority, voice: 0.30, video: 0.40, best_effort: 0.30}
  utilisation_zones: {safe: 0.70, monitor: 0.90}

forecasting:
  annual_growth_rate: 0.15
  horizon_years: 5
  initial_utilisation: 0.60
  planning_trigger_rho: 0.70
  action_trigger_rho: 0.90